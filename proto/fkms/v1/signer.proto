syntax = "proto3";

package fkms.v1;

service FkmsService {
  rpc SignEvm(SignEvmRequest) returns (SignEvmResponse);
  rpc SignXrpl(SignXrplRequest) returns (SignXrplResponse);
  rpc SignIcon(SignIconRequest) returns (SignIconResponse);
  rpc SignFlow(SignFlowRequest) returns (SignFlowResponse);
  rpc SignSoroban(SignSorobanRequest) returns (SignSorobanResponse);
  rpc GetSignerAddresses(GetSignerAddressesRequest) returns (GetSignerAddressesResponse);
}

message EvmSignerPayload {
  string address    = 1;  // signer address (hex, lowercase)
  uint64 chain_id   = 2;
  uint64 nonce      = 3;
  string to         = 4;  // tunnel router address (hex)
  uint64 gas_limit  = 5;
  // Legacy tx fields
  bytes  gas_price  = 6;  // big-endian big.Int bytes
  // EIP-1559 fields
  bytes  gas_fee_cap = 7; // big-endian big.Int bytes (maxFeePerGas)
  bytes  gas_tip_cap = 8; // big-endian big.Int bytes (maxPriorityFeePerGas)
}

message SignEvmRequest {
  EvmSignerPayload signer_payload = 1;
  Tss tss = 2;
}

message SignEvmResponse {
  bytes tx_blob = 1;  // complete EIP-2718 encoded signed transaction
}

message SignXrplRequest {
  XrplSignerPayload signer_payload = 1;
  Tss tss = 2;
}

message SignXrplResponse {
  bytes tx_blob = 1;
}

message SignIconRequest {
  IconSignerPayload signer_payload = 1;
  Tss tss = 2;
}

message SignIconResponse {
  bytes tx_params = 1;
}

message SignFlowRequest {
  FlowSignerPayload signer_payload = 1;
  Tss tss = 2;
}

message SignFlowResponse {
  bytes tx_blob = 1;
}

message SignSorobanRequest {
  SorobanSignerPayload signer_payload = 1;
  Tss tss = 2;
}

message SignSorobanResponse {
  // Soroban transaction envelope in base64 format
  string tx_blob = 1;
}

message GetSignerAddressesRequest {}

message GetSignerAddressesResponse {
  repeated Signers signers = 1;
}

message XrplSignerPayload {
  string account = 1;
  uint64 oracle_id = 2;
  string fee = 3;
  uint64 sequence = 4;
}

message IconSignerPayload {
  string relayer = 1;
  string contract_address = 2;
  uint64 step_limit = 3;
  string network_id = 4;
}

message FlowSignerPayload {
  string address = 1;
  uint64 compute_limit = 2;
  string block_id = 3;
  uint32 key_index = 4;
  uint64 sequence = 5;
  string contract_address = 6;
}

message SorobanSignerPayload {
  string source_account = 1;
  string contract_address = 2;
  string fee = 3;
  int64 sequence = 4;
  string network_passphrase = 5;
  repeated string rpc_urls = 6;
}

message Tss {
  bytes message = 1;
  bytes random_addr = 2;
  bytes signature_s = 3;
}

message Signers {
  ChainType chain_type = 1;
  repeated string addresses = 2;
}

enum ChainType {
  EVM = 0;
  XRPL = 1;
  ICON = 2;
  FLOW = 3;
  SOROBAN = 4;
}
